name: test

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --locked
      - run: uv lock --check
      - run: uv run ruff check .
      - run: uv run mypy src
      - run: uv run python -m compileall -q src tests
      - name: Check generated shell syntax
        run: uv run pytest -q tests/unit/test_release_quality.py -k test_generated_shell_syntax
      - name: Install Python 3.10 for agent compatibility
        run: uv python install 3.10
      - name: Check Python 3.10 packaged agent
        run: >-
          CODEX_PYTHON_310="$(uv python find 3.10)"
          uv run pytest -q tests/integration/test_agent_zipapp.py
          -k test_agent_zipapp_runs_on_python_310
      - name: Check legacy imports
        run: uv run pytest -q tests/unit/test_release_quality.py -k test_no_legacy_module_imports
      - name: Check E2E fixture contract
        run: uv run pytest -q tests/e2e/test_fixture_contract.py
      - name: Check watcher daemon latency
        run: >-
          uv run pytest -q tests/integration/test_watcher_daemon_latency.py
          -k test_real_local_watcher_daemon_propagates_within_two_seconds
      - name: Check in-tree metadata
        run: >-
          uv run pytest -q tests/unit/test_release_quality.py
          -k test_no_in_tree_control_metadata
      - name: Check generated artifacts
        run: >-
          uv run pytest -q tests/unit/test_release_quality.py
          -k test_no_tracked_generated_artifacts
      - name: Check git diff
        run: git diff --check

  unit-integration:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}
      - run: uv sync --locked
      - run: >-
          uv run pytest tests/unit tests/integration
          --cov=remote_sandbox
          --cov-report=term-missing
          --cov-fail-under=85

  performance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - run: sudo apt-get update && sudo apt-get install -y rsync
      - run: uv sync --locked
      - run: uv run pytest -q -s tests/performance -m performance

  docker-e2e:
    runs-on: ubuntu-latest
    env:
      CODEX_E2E_REQUIRED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --locked
      - run: uv run pytest -q -s tests/e2e -m e2e

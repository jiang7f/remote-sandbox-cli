name: test

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --locked
      - run: uv lock --check
      - run: uv run ruff check .
      - run: uv run mypy src
      - run: uv run python -m compileall -q src tests

  unit-integration:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}
      - run: uv sync --locked
      - run: >-
          uv run pytest tests/unit tests/integration
          --cov=remote_sandbox
          --cov-report=term-missing
          --cov-fail-under=85

  performance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - run: sudo apt-get update && sudo apt-get install -y rsync
      - run: uv sync --locked
      - run: uv run pytest -q -s tests/performance -m performance

  docker-e2e:
    runs-on: ubuntu-latest
    env:
      CODEX_E2E_REQUIRED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --locked
      - run: uv run pytest -q -s tests/e2e -m e2e
